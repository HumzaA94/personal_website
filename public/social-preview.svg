<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Humza Ahmed - Product, Data and AI Engineering Leader</title>
  <desc id="desc">Social preview card for Humza Ahmed's personal website.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#06111f" />
      <stop offset="0.52" stop-color="#0f172a" />
      <stop offset="1" stop-color="#111827" />
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#22d3ee" />
      <stop offset="1" stop-color="#60a5fa" />
    </linearGradient>
    <filter id="blur" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="36" />
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)" />
  <circle cx="980" cy="120" r="210" fill="#22d3ee" opacity="0.2" filter="url(#blur)" />
  <circle cx="1050" cy="500" r="260" fill="#60a5fa" opacity="0.16" filter="url(#blur)" />
  <rect x="70" y="70" width="1060" height="490" rx="44" fill="#0f172a" opacity="0.72" stroke="#334155" />
  <rect x="106" y="108" width="78" height="78" rx="26" fill="url(#accent)" />
  <text x="145" y="158" fill="#06111f" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800" text-anchor="middle">HA</text>
  <text x="106" y="253" fill="#22d3ee" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800" letter-spacing="5">PRODUCT PLATFORMS | AI WORKFLOWS | OPERATIONAL DATA</text>
  <text x="106" y="342" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="76" font-weight="800" letter-spacing="-4">Humza Ahmed</text>
  <text x="106" y="414" fill="#cbd5e1" font-family="Inter, Arial, sans-serif" font-size="38" font-weight="600">Product, Data and AI Engineering Leader</text>
  <text x="106" y="488" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="28">Building trusted internal products and data systems for complex teams.</text>
